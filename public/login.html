<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bus Tracker</title>
  <link rel="stylesheet" href="css/bus-tracker.css">
</head>
<body>
  <header class="header">
    <div class="header-logo">
      <div class="bus-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z" fill="#fff"/></svg>
      </div>
      <span class="header-title">Bus Tracker</span>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-section">
      <a href="logout.html" class="sidebar-item logout">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-7 7 7 7zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </span>
        <span>Logout</span>
      </a>
    </div>
    <div class="sidebar-section">
      <a href="search.html" class="sidebar-item">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
        </span>
        <span>Search Bus</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a href="logout.html" class="sidebar-item logout">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-7 7 7 7zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </span>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-card">
      <h1>Login to Bus Tracker</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon icon-person">✉</span>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon icon-lock">🔒</span>
            <input type="password" id="password" name="password" placeholder="Password" required>
          </div>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember Me</label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
        <p class="register-link">Don't have an account? <a href="register.html">Register</a> with your name, email and password first.</p>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!email || !password) {
        alert('Please enter email and password');
        return;
      }
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      })
      .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
      .then(function(result) {
        if (!result.ok) {
          alert(result.data.message || 'Wrong email or password');
          return;
        }
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('token', result.data.token);
        var userName = (result.data.user && result.data.user.name) ? result.data.user.name : email;
        localStorage.setItem('username', userName);
        alert('Welcome, ' + userName + '!');
        window.location.href = 'search.html';
      })
      .catch(function() {
        alert('Wrong email or password');
      });
    });
  </script>
</body>
</html>
